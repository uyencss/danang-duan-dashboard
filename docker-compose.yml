services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: danang-dashboard-web
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - DATABASE_URL=${DATABASE_URL}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - TURSO_SYNC_PERIOD=${TURSO_SYNC_PERIOD:-60}
      - LOCAL_REPLICA_PATH=file:/app/data/local-replica.db
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ABLY_API_KEY=${ABLY_API_KEY}
      - NEXT_PUBLIC_ABLY_KEY=${NEXT_PUBLIC_ABLY_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      backend:
        aliases:
          - web

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: danang-dashboard-tunnel
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: >
      tunnel --no-autoupdate run
      --token ${CLOUDFLARE_TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    depends_on:
      - web
    networks:
      - backend

networks:
  backend:
    driver: bridge