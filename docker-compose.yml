services:
  web-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: danang-dashboard-web-1
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - DATABASE_URL=${DATABASE_URL}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - TURSO_SYNC_PERIOD=${TURSO_SYNC_PERIOD:-60}
      - LOCAL_REPLICA_PATH=/app/data/local-replica.db
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ABLY_API_KEY=${ABLY_API_KEY}
      - NEXT_PUBLIC_ABLY_KEY=${NEXT_PUBLIC_ABLY_KEY}
    ports:
      - "3000:3000"
    volumes:
      - replica-data-1:/app/data

  web-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: danang-dashboard-web-2
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - DATABASE_URL=${DATABASE_URL}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - TURSO_SYNC_PERIOD=${TURSO_SYNC_PERIOD:-60}
      - LOCAL_REPLICA_PATH=/app/data/local-replica.db
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ABLY_API_KEY=${ABLY_API_KEY}
      - NEXT_PUBLIC_ABLY_KEY=${NEXT_PUBLIC_ABLY_KEY}
    ports:
      - "3001:3000"
    volumes:
      - replica-data-2:/app/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: danang-dashboard-tunnel
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: >
      tunnel --no-autoupdate run
      --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web-1
      - web-2

volumes:
  replica-data-1:
  replica-data-2: