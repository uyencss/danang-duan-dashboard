services:
  init-perms:
    image: alpine:latest
    container_name: danang-dashboard-perms
    command: >
      sh -c "mkdir -p /app/logs /app/uploads &&
             chown -R 1001:1001 /app/uploads &&
             chmod 777 /app/logs"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  redis:
    image: redis:7-alpine
    container_name: danang-dashboard-redis
    restart: always
    command: >
      sh -c "redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --loglevel warning 2>&1 | tee -a /app/logs/redis.log"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - redis-data:/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:17-alpine
    container_name: danang-dashboard-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mobi_prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d mobi_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ID: ${BUILD_ID:-default_build_id}
    container_name: danang-dashboard-web
    restart: always
    command: >
      sh -c "node server.js 2>&1 | tee -a /app/logs/web.log"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ABLY_API_KEY=${ABLY_API_KEY}
      - NEXT_PUBLIC_ABLY_KEY=${NEXT_PUBLIC_ABLY_KEY}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      init-perms:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    networks:
      backend:
        aliases:
          - web

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: danang-dashboard-tunnel
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - TUNNEL_LOGFILE=/app/logs/cloudflared.log
    command: >
      tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    depends_on:
      - web
    networks:
      - backend

  cloudflared-db:
    image: cloudflare/cloudflared:latest
    container_name: danang-dashboard-db-tunnel
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - TUNNEL_LOGFILE=/app/logs/cloudflared-db.log
    command: >
      tunnel --no-autoupdate run --token ${CLOUDFLARE_DB_TUNNEL_TOKEN}
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    depends_on:
      - db
    networks:
      - backend

volumes:
  postgres-data:
  redis-data:

networks:
  backend:
    driver: bridge
