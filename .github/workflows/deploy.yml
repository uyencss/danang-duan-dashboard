name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
          NEXT_PUBLIC_ABLY_KEY: ${{ secrets.NEXT_PUBLIC_ABLY_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        with:
          host: 100.68.79.40
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,TURSO_DATABASE_URL,TURSO_AUTH_TOKEN,NEXT_PUBLIC_APP_URL,BETTER_AUTH_SECRET,BETTER_AUTH_URL,ABLY_API_KEY,NEXT_PUBLIC_ABLY_KEY,CLOUDFLARE_TUNNEL_TOKEN,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,SMTP_FROM
          script: |
            mkdir -p /home/hieunq/Desktop/code-deployments
            cd /home/hieunq/Desktop/code-deployments
            
            if [ -d "danang-duan-dashboard" ]; then
              cd danang-duan-dashboard
              git fetch origin master
              git reset --hard origin/master
              git clean -fd
            else
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/uyencss/danang-duan-dashboard.git
              cd danang-duan-dashboard
            fi
            
            # Recreate the .env file from GitHub Actions Secrets
            cat <<EOF > .env
            BUILD_ID="${{ github.sha }}"
            DATABASE_URL="$DATABASE_URL"
            TURSO_DATABASE_URL="$TURSO_DATABASE_URL"
            TURSO_AUTH_TOKEN="$TURSO_AUTH_TOKEN"
            NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL"
            BETTER_AUTH_SECRET="$BETTER_AUTH_SECRET"
            BETTER_AUTH_URL="$BETTER_AUTH_URL"
            ABLY_API_KEY="$ABLY_API_KEY"
            NEXT_PUBLIC_ABLY_KEY="$NEXT_PUBLIC_ABLY_KEY"
            CLOUDFLARE_TUNNEL_TOKEN="$CLOUDFLARE_TUNNEL_TOKEN"
            SMTP_HOST="$SMTP_HOST"
            SMTP_PORT="$SMTP_PORT"
            SMTP_USER="$SMTP_USER"
            SMTP_PASSWORD="$SMTP_PASSWORD"
            SMTP_FROM="$SMTP_FROM"
            EOF

            # Build and deploy locally on this machine
            docker compose up -d --build web
