name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_SYNC_PERIOD: ${{ secrets.TURSO_SYNC_PERIOD }}
          LOCAL_REPLICA_PATH: ${{ secrets.LOCAL_REPLICA_PATH }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
          NEXT_PUBLIC_ABLY_KEY: ${{ secrets.NEXT_PUBLIC_ABLY_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        with:
          host: 100.68.79.40,100.73.101.28
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,TURSO_DATABASE_URL,TURSO_AUTH_TOKEN,TURSO_SYNC_PERIOD,LOCAL_REPLICA_PATH,NEXT_PUBLIC_APP_URL,BETTER_AUTH_SECRET,BETTER_AUTH_URL,ABLY_API_KEY,NEXT_PUBLIC_ABLY_KEY,CLOUDFLARE_TUNNEL_TOKEN
          script: |
            mkdir -p /home/hieunq/Desktop/code-deployments
            cd /home/hieunq/Desktop/code-deployments
            
            if [ -d "danang-duan-dashboard" ]; then
              cd danang-duan-dashboard
              git pull origin master
            else
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/uyencss/danang-duan-dashboard.git
              cd danang-duan-dashboard
            fi
            
            # Recreate the .env file from GitHub Actions Secrets
            cat <<EOF > .env
            DATABASE_URL="$DATABASE_URL"
            TURSO_DATABASE_URL="$TURSO_DATABASE_URL"
            TURSO_AUTH_TOKEN="$TURSO_AUTH_TOKEN"
            TURSO_SYNC_PERIOD="$TURSO_SYNC_PERIOD"
            LOCAL_REPLICA_PATH="$LOCAL_REPLICA_PATH"
            NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL"
            BETTER_AUTH_SECRET="$BETTER_AUTH_SECRET"
            BETTER_AUTH_URL="$BETTER_AUTH_URL"
            ABLY_API_KEY="$ABLY_API_KEY"
            NEXT_PUBLIC_ABLY_KEY="$NEXT_PUBLIC_ABLY_KEY"
            CLOUDFLARE_TUNNEL_TOKEN="$CLOUDFLARE_TUNNEL_TOKEN"
            EOF

            docker compose pull
            docker compose up -d --build
