name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Build and Push Image on Primary Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: 100.68.79.40
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            mkdir -p /home/hieunq/Desktop/code-deployments
            cd /home/hieunq/Desktop/code-deployments
            
            if [ -d "danang-duan-dashboard" ]; then
              cd danang-duan-dashboard
              git pull origin master
            else
              git clone https://x-access-token:$GITHUB_TOKEN@github.com/uyencss/danang-duan-dashboard.git
              cd danang-duan-dashboard
            fi
            
            # Login to GitHub Container Registry using the transient token
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u uyencss --password-stdin
            
            # Build and push 
            docker build --build-arg BUILD_ID="${{ github.sha }}" -t ghcr.io/uyencss/danang-duan-dashboard:latest .
            docker push ghcr.io/uyencss/danang-duan-dashboard:latest
            
      - name: Deploy to All Servers
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_SYNC_PERIOD: ${{ secrets.TURSO_SYNC_PERIOD }}
          LOCAL_REPLICA_PATH: ${{ secrets.LOCAL_REPLICA_PATH }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
          NEXT_PUBLIC_ABLY_KEY: ${{ secrets.NEXT_PUBLIC_ABLY_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        with:
          host: 100.68.79.40,100.73.101.28
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,DATABASE_URL,TURSO_DATABASE_URL,TURSO_AUTH_TOKEN,TURSO_SYNC_PERIOD,LOCAL_REPLICA_PATH,NEXT_PUBLIC_APP_URL,BETTER_AUTH_SECRET,BETTER_AUTH_URL,ABLY_API_KEY,NEXT_PUBLIC_ABLY_KEY,CLOUDFLARE_TUNNEL_TOKEN,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,SMTP_FROM
          script: |
            mkdir -p /home/hieunq/Desktop/code-deployments
            cd /home/hieunq/Desktop/code-deployments/danang-duan-dashboard
            
            # Ensure the docker-compose template is updated
            git pull origin master
            
            # Login to GHCR to pull the image
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u uyencss --password-stdin
            
            # Recreate the .env file
            cat <<EOF > .env
            BUILD_ID="${{ github.sha }}"
            DATABASE_URL="$DATABASE_URL"
            TURSO_DATABASE_URL="$TURSO_DATABASE_URL"
            TURSO_AUTH_TOKEN="$TURSO_AUTH_TOKEN"
            TURSO_SYNC_PERIOD="$TURSO_SYNC_PERIOD"
            LOCAL_REPLICA_PATH="$LOCAL_REPLICA_PATH"
            NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL"
            BETTER_AUTH_SECRET="$BETTER_AUTH_SECRET"
            BETTER_AUTH_URL="$BETTER_AUTH_URL"
            ABLY_API_KEY="$ABLY_API_KEY"
            NEXT_PUBLIC_ABLY_KEY="$NEXT_PUBLIC_ABLY_KEY"
            CLOUDFLARE_TUNNEL_TOKEN="$CLOUDFLARE_TUNNEL_TOKEN"
            SMTP_HOST="$SMTP_HOST"
            SMTP_PORT="$SMTP_PORT"
            SMTP_USER="$SMTP_USER"
            SMTP_PASSWORD="$SMTP_PASSWORD"
            SMTP_FROM="$SMTP_FROM"
            EOF

            # Pull the prebuilt identical image and restart
            docker compose pull web
            docker compose up -d web
